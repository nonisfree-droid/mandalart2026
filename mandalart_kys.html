<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>영서 2026 만다르트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f4f0; min-height: 100vh; padding: 12px; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
header h1 { font-size: 15px; font-weight: 600; color: #2C2C2A; }
.stats { display: flex; gap: 14px; }
.stat { text-align: center; }
.stat-num { font-size: 17px; font-weight: 600; color: #2C2C2A; }
.stat-label { font-size: 10px; color: #888780; }

/* 9x9 그리드 → 3x3 블록 */
.manda-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 4px;
  width: 100%;
  aspect-ratio: 1;
}

/* 각 3x3 블록 */
.block {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 2px;
  padding: 3px;
  border-radius: 6px;
}

/* 각 셀 */
.cell {
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 8px;
  text-align: center;
  line-height: 1.25;
  padding: 2px;
  transition: opacity .15s;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
  word-break: keep-all;
}
.cell.core-cell { font-size: 9px; font-weight: 700; }
.cell.main-cell { font-size: 10px; font-weight: 700; }
.cell.done { opacity: 1; }
.cell.todo { opacity: 0.48; }
.cell .ck { font-size: 8px; line-height: 1; margin-bottom: 1px; height: 9px; }

/* 하단 패널 */
.panel { margin-top: 10px; background: #fff; border-radius: 10px; padding: 12px; border: 0.5px solid #D3D1C7; }
.panel-title { font-size: 13px; font-weight: 600; color: #2C2C2A; margin-bottom: 3px; }
.panel-sub { font-size: 11px; color: #888780; }
.bar-wrap { margin-top: 7px; background: #E8E7E3; border-radius: 3px; height: 4px; }
.bar { height: 4px; border-radius: 3px; transition: width .4s; }

.cat-rows { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.cat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.cat-name { width: 46px; color: #444441; flex-shrink: 0; }
.cat-bar-wrap { flex: 1; background: #E8E7E3; border-radius: 3px; height: 5px; }
.cat-bar { height: 5px; border-radius: 3px; }
.cat-pct { width: 26px; text-align: right; color: #888780; font-size: 10px; }

.btn-area { margin-top: 10px; display: flex; gap: 8px; }
.btn { flex: 1; padding: 11px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-save { background: #534AB7; color: #fff; }
.btn-note { background: #fff; color: #534AB7; border: 1px solid #534AB7; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2C2C2A; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 100; }
.toast.show { opacity: 1; }

.note-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: flex-end; justify-content: center; z-index: 200; }
.note-modal.open { display: flex; }
.note-box { background: #fff; border-radius: 16px 16px 0 0; padding: 18px; width: 100%; max-width: 480px; }
.note-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.note-box textarea { width: 100%; border: 0.5px solid #D3D1C7; border-radius: 8px; padding: 9px; font-size: 13px; resize: none; font-family: inherit; }
.tag-row { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
.tag { padding: 4px 9px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #D3D1C7; color: #888780; background: #fff; }
.tag.sel { border-color: #534AB7; color: #534AB7; background: #EEEDFE; }
.note-btn-row { display: flex; gap: 8px; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <h1>영서 2026 만다르트</h1>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">완료</div></div>
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">전체</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">달성률</div></div>
  </div>
</header>

<div class="manda-grid" id="grid"></div>

<div class="panel" id="detail">
  <div class="panel-title" id="d-title">셀을 눌러 실천 기록을 남겨보세요</div>
  <div class="panel-sub" id="d-sub">완료한 항목을 탭하면 체크돼요</div>
  <div class="bar-wrap"><div class="bar" id="d-bar" style="width:0%"></div></div>
</div>

<div class="panel">
  <div class="panel-title" style="margin-bottom:0">카테고리별 진행률</div>
  <div class="cat-rows" id="cat-rows"></div>
</div>

<div class="btn-area">
  <button class="btn btn-note" onclick="openNote()">느낀 점 남기기</button>
  <button class="btn btn-save" onclick="saveAll()">기록 저장</button>
</div>

<div class="note-modal" id="noteModal">
  <div class="note-box">
    <h3>오늘 느낀 점</h3>
    <textarea id="noteText" rows="4" placeholder="오늘 실천하면서 느낀 점, 힘들었던 점, 뿌듯했던 점을 자유롭게 써주세요."></textarea>
    <div class="tag-row">
      <span class="tag" onclick="toggleTag(this)">뿌듯해</span>
      <span class="tag" onclick="toggleTag(this)">힘들었어</span>
      <span class="tag" onclick="toggleTag(this)">아쉬워</span>
      <span class="tag" onclick="toggleTag(this)">성장한 것 같아</span>
      <span class="tag" onclick="toggleTag(this)">평범한 하루</span>
    </div>
    <div class="note-btn-row">
      <button class="btn" style="background:#F1EFE8;color:#2C2C2A" onclick="closeNote()">취소</button>
      <button class="btn btn-save" onclick="confirmNote()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// 블록 배치: [0=좌상 연구, 1=상 커리어, 2=우상 건강, 3=좌 영어, 4=중앙, 5=우 재테크, 6=좌하 취미, 7=하 관계, 8=우하 일상]

    {id:"E-01",l:"영어 스피킹\nOPIC AL"},
    {id:"E-02",l:"영어 IELTS 7.5"},
  ]},
  { cat:"커리어", cells:[

    {id:"K-02",l:"박사 여부 결정\n(해외/국내 또한)"},
    {id:"K-03",l:"실무자 커피챗\n혹은 만남\n5회 이상"},
    {id:"K-04",l:"포폴 사이트\n만들기"},
    {id:"CK",l:"커리어",core:true},
    {id:"K-05",l:"세상에 필요한것,\n기여를 할 수\n있는것, 정말\n중요한 가치있는\n일 찾기"},
    {id:"K-06",l:"외부 프로그램\n참여(산학 or\n강연???)"},

// 3x3 그리드 배치 순서 (원본 이미지 기준)
// 좌상=연구(0), 중상=재테크(1), 우상=건강(2)
// 좌중=취미(3), 중중=중앙(4), 우중=취미(5)
// 좌하=관계(6), 중하=언어(7), 우하=커리어(8)
const GRID_ORDER = [0,1,2,3,4,5,6,7,8];

let done = new Set();
let noteText = '';
let noteTags = [];

function loadState() {
  try {
    const s = localStorage.getItem('mandalart2026');
    if (s) done = new Set(JSON.parse(s));
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('mandalart2026', JSON.stringify([...done]));
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  GRID_ORDER.forEach(bi => {
    const block = BLOCKS[bi];
    const isCenter = block.center;
    const cat = block.cat;
    const c = CAT[cat] || CAT["연구"];

    const blockDiv = document.createElement('div');
    blockDiv.className = 'block';
    blockDiv.style.background = isCenter ? '#FAC77566' : c.bg + 'aa';

    block.cells.forEach(cell => {
      const cellCat = cell.cat || cat;
      const cc = CAT[cellCat] || c;
      const isDone = done.has(cell.id);
      const isCore = cell.core;
      const isMain = cell.main;

      const el = document.createElement('div');
      el.className = 'cell' + (isMain?' main-cell':isCore?' core-cell':'') + (isDone?' done':' todo');

      if (isMain) {
        el.style.background = '#BA7517';
        el.style.color = '#fff';
        el.style.border = '2px solid #854F0B';
      } else if (isCore) {
        el.style.background = isDone ? cc.done : cc.done + '22';
        el.style.color = isDone ? '#fff' : cc.done;
        el.style.border = `1.5px solid ${cc.done}`;
      } else {
        el.style.background = isDone ? cc.done : '#fff';
        el.style.color = isDone ? '#fff' : cc.text;
        el.style.border = `0.5px solid ${cc.done}44`;
      }

      const ck = document.createElement('div');
      ck.className = 'ck';
      ck.textContent = isDone ? '✓' : '';
      el.appendChild(ck);

      const tx = document.createElement('div');
      tx.style.whiteSpace = 'pre-line';
      tx.style.overflow = 'hidden';
      tx.textContent = cell.l;
      el.appendChild(tx);

      if (!isMain) el.addEventListener('click', () => tapCell(cell, cellCat));
      blockDiv.appendChild(el);
    });
    grid.appendChild(blockDiv);
  });
  updateStats();
  renderCatBars();
}

function tapCell(cell, cat) {
  if (!cell.core) {
    if (done.has(cell.id)) done.delete(cell.id);
    else done.add(cell.id);
    saveState();
    render();
  }
  showDetail(cell, cat);
}

function showDetail(cell, cat) {
  const cc = CAT[cat] || CAT["연구"];
  const isDone = done.has(cell.id);
  const block = BLOCKS.find(b => b.cells.some(c => c.id === cell.id));
  let cd = 0, ct = 0;
  if (block) block.cells.forEach(c => { if(!c.core&&!c.main){ct++;if(done.has(c.id))cd++;} });
  const pct = ct ? Math.round(cd/ct*100) : 0;
  document.getElementById('d-title').textContent = (isDone?'✓ ':'◯ ') + cell.l.replace(/\n/g,' ');
  document.getElementById('d-title').style.color = isDone ? cc.done : '#2C2C2A';
  document.getElementById('d-sub').textContent = `[${cat}] ${cd}/${ct} 완료 (${pct}%)`;
  const bar = document.getElementById('d-bar');
  bar.style.width = pct+'%';
  bar.style.background = cc.done;
}

function updateStats() {
  const all = BLOCKS.flatMap(b=>b.cells.filter(c=>!c.core&&!c.main));
  const total = all.length;
  const d = all.filter(c=>done.has(c.id)).length;
  document.getElementById('s-done').textContent = d;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pct').textContent = Math.round(d/total*100)+'%';
}

function renderCatBars() {
  const cats = [
    {name:"연구",   key:"연구"},
    {name:"재테크", key:"재테크"},
    {name:"건강",   key:"건강"},
    {name:"도전",   key:"취미"},
    {name:"취미",   key:"취미"},
    {name:"관계",   key:"관계"},
    {name:"언어",   key:"영어"},
    {name:"커리어", key:"커리어"},
  ];
  const rows = document.getElementById('cat-rows');
  rows.innerHTML = '';
  const seen = new Set();
  cats.forEach(({name, key}) => {
    if (seen.has(name)) return;
    seen.add(name);
    const blockIdx = BLOCKS.findIndex(b => b.cat === key && !b.center);
    if (blockIdx < 0) return;
    const block = BLOCKS[blockIdx];
    const cells = block.cells.filter(c=>!c.core&&!c.main);
    const total = cells.length;
    const d = cells.filter(c=>done.has(c.id)).length;
    const pct = total ? Math.round(d/total*100) : 0;
    const cc = CAT[key];
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `<span class="cat-name">${name}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${cc.done}"></div></div><span class="cat-pct">${pct}%</span>`;
    rows.appendChild(row);
  });
}

function openNote() { document.getElementById('noteModal').classList.add('open'); }
function closeNote() { document.getElementById('noteModal').classList.remove('open'); }
function confirmNote() {
  noteText = document.getElementById('noteText').value;
  noteTags = [...document.querySelectorAll('.tag.sel')].map(t=>t.textContent);
  closeNote();
  showToast('느낀 점이 저장됐어요');
}
function toggleTag(el) { el.classList.toggle('sel'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

async function saveAll() {
  const today = new Date().toISOString().split('T')[0];
  const doneList = [...done];
  const payload = {
    date: today,
    done: doneList,
    note: noteText,
    tags: noteTags,
    total: BLOCKS.flatMap(b=>b.cells.filter(c=>!c.core&&!c.main)).length,
    doneCount: doneList.length,
  };
  const WEBHOOK_URL = 'YOUR_N8N_WEBHOOK_URL';
  try {
    await fetch(WEBHOOK_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    showToast('기록이 저장됐어요!');
  } catch(e) {
    showToast('저장됐어요 (로컬)');
  }
  saveState();
}

loadState();
render();
</script>
</body>
